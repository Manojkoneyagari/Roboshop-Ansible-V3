
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install prerequisites
  apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - unzip
    state: present


- name: application setup
  import_role:
    name: common
    tasks_from: app_setup

- name: Install Nodejs
  import_role:
    name: common
    tasks_from: nodejs

- name: "copy {{ component }} service"
  import_role:
    name: common
    tasks_from: copy_service


- name: Restart service
  import_role:
    name: common
    tasks_from: service_restart.yml