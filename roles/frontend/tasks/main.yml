
- name: Installing required packages
  package:
    name:
      - gpg
      - unzip
    state: present

- name: nginx setup
  import_role:
    name: common
    tasks_from: nginx_setup

- name: printing gather facts
  debug:
    var: ansible_distribution_release


- name: Update apt cache
  apt:
    update_cache: yes

- name: Install specific Nginx version
  apt:
    name: nginx=1.24.*
    state: present

- name: removing directory if it exists
  ansible.builtin.file:
    path: /var/www/html/
    state: absent

- name: Remove a zip file if it exists
  ansible.builtin.file:
    path: /tmp/frontend.zip
    state: absent

- name: Creating directory
  ansible.builtin.file:
    path: /var/www/html/
    state: directory

- name: Downloading code
  get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
    dest: /tmp/frontend.zip

- name: unzip the file
  unarchive:
    src: /tmp/frontend.zip
    dest: /var/www/html
    remote_src: yes

- name: copy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/roboshop

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Enable roboshop site
  file:
    src: /etc/nginx/sites-available/roboshop
    dest: /etc/nginx/sites-enabled/roboshop
    state: link

- name: restart and enable frontend
  service:
    name: nginx
    state: restarted
    enabled: yes